<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 600px; padding: 24px; }
        h1 { text-align: center; font-size: 28px; margin-bottom: 6px; color: #7f8cff; }
        .subtitle { text-align: center; color: #9fa3b1; font-size: 14px; margin-bottom: 32px; }
        .card { background: #16213e; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid #1a2a4a; }
        .card-title { font-size: 12px; color: #9fa3b1; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #2a3a5a; background: transparent; color: #9fa3b1; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; }
        .tab.active { background: #7f8cff; border-color: #7f8cff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .upload-area { border: 2px dashed #2a3a5a; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #7f8cff; background: #1a2a4a; }
        .upload-area input { display: none; }
        .upload-icon { width: 48px; height: 48px; background: #1a2a4a; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; }
        .upload-text { color: #7f8cff; font-size: 14px; }
        .upload-hint { color: #9fa3b1; font-size: 12px; margin-top: 4px; }
        .file-name { color: #4ecca3; font-size: 13px; margin-top: 8px; }
        .mic-area { text-align: center; padding: 24px; }
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; transition: all 0.3s; background: #1a2a4a; }
        .mic-btn.recording { background: #ff4444; animation: pulse 1s infinite; }
        .mic-btn.ready { background: #4ecca3; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .mic-status { color: #9fa3b1; font-size: 14px; margin-bottom: 8px; }
        .mic-status.recording { color: #ff4444; }
        .mic-status.ready { color: #4ecca3; }
        .timer { font-size: 24px; font-weight: 600; color: #7f8cff; margin-bottom: 16px; display: none; }
        .btn { width: 100%; padding: 14px; background: #7f8cff; border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 16px; }
        .btn:hover { background: #6a75ff; }
        .btn:disabled { background: #3a3a5a; cursor: not-allowed; }
        .results { display: none; }
        .result-item { margin-bottom: 12px; }
        .result-label { font-size: 11px; color: #9fa3b1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .result-value { background: #0f3460; border-radius: 8px; padding: 12px; font-size: 14px; color: #e0e0e0; line-height: 1.5; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .intent-value { color: #7f8cff; font-weight: 600; }
        .confidence-value { color: #4ecca3; font-weight: 600; }
        .audio-player { background: #0f3460; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; }
        .play-btn { width: 36px; height: 36px; background: #4ecca3; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .audio-label { font-size: 12px; color: #4ecca3; }
        .loading { display: none; text-align: center; padding: 20px; color: #9fa3b1; }
        .spinner { width: 32px; height: 32px; border: 3px solid #1a2a4a; border-top: 3px solid #7f8cff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { background: #3a1a1a; border: 1px solid #ff4444; border-radius: 8px; padding: 12px; color: #ff8888; font-size: 13px; display: none; margin-bottom: 12px; }
        audio { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>AI Voice Bot</h1>
    <p class="subtitle">Customer Support Assistant — Powered by BERT + Whisper</p>

    <div class="card">
        <div class="card-title">Input</div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('upload', this)">Upload File</button>
            <button class="tab" onclick="switchTab('record', this)">Record Voice</button>
        </div>

        <div class="tab-content active" id="tab-upload">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".mp3,.wav,.m4a" onchange="handleFile(this)">
                <div class="upload-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7f8cff" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </div>
                <div class="upload-text">Click to choose audio file</div>
                <div class="upload-hint">Supports WAV, MP3, M4A</div>
                <div class="file-name" id="fileName"></div>
            </div>
            <button class="btn" id="submitBtn" onclick="sendAudio()" disabled>Submit to Voice Bot</button>
        </div>

        <div class="tab-content" id="tab-record">
            <div class="mic-area">
                <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7f8cff" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <div class="timer" id="timer">0:00</div>
                <div class="mic-status" id="micStatus">Click mic to start recording</div>
            </div>
            <button class="btn" id="sendRecordingBtn" onclick="sendRecording()" disabled>Send Recording</button>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Processing your audio...</div>
    </div>

    <div class="error" id="error"></div>

    <div class="card results" id="results">
        <div class="card-title">Results</div>
        <div class="result-item">
            <div class="result-label">Transcript</div>
            <div class="result-value" id="transcript"></div>
        </div>
        <div class="result-grid">
            <div class="result-item">
                <div class="result-label">Intent</div>
                <div class="result-value intent-value" id="intent"></div>
            </div>
            <div class="result-item">
                <div class="result-label">Confidence</div>
                <div class="result-value confidence-value" id="confidence"></div>
            </div>
        </div>
        <div class="result-item">
            <div class="result-label">Response</div>
            <div class="result-value" id="response"></div>
        </div>
        <div class="result-item">
            <div class="result-label">Audio Response</div>
            <div class="audio-player">
                <button class="play-btn" onclick="document.getElementById('audioEl').play()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="#16213e"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </button>
                <div class="audio-label" id="audioLabel">Click play to hear response</div>
                <audio id="audioEl"></audio>
            </div>
        </div>
    </div>
</div>

<script>
let mediaRecorder, audioChunks = [], recordingInterval, recordingSeconds = 0, recordedBlob = null;

function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
}

function handleFile(input) {
    if (input.files && input.files[0]) {
        document.getElementById('fileName').textContent = input.files[0].name;
        document.getElementById('submitBtn').disabled = false;
    }
}

async function toggleRecording() {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                recordedBlob = new Blob(audioChunks, { type: 'audio/wav' });
                document.getElementById('sendRecordingBtn').disabled = false;
                document.getElementById('micStatus').textContent = 'Recording ready! Click Send.';
                document.getElementById('micStatus').className = 'mic-status ready';
                document.getElementById('micBtn').className = 'mic-btn ready';
                document.getElementById('timer').style.display = 'none';
                document.getElementById('timer').textContent = '0:00';
                recordingSeconds = 0;
            };
            mediaRecorder.start();
            recordingSeconds = 0;
            document.getElementById('timer').style.display = 'block';
            document.getElementById('micBtn').className = 'mic-btn recording';
            document.getElementById('micStatus').textContent = 'Recording... Click to stop';
            document.getElementById('micStatus').className = 'mic-status recording';
            recordingInterval = setInterval(() => {
                recordingSeconds++;
                const m = Math.floor(recordingSeconds / 60);
                const s = recordingSeconds % 60;
                document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
            }, 1000);
        } catch(e) {
            document.getElementById('micStatus').textContent = 'Microphone access denied!';
        }
    } else {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
        clearInterval(recordingInterval);
    }
}

async function sendRecording() {
    if (!recordedBlob) return;
    const formData = new FormData();
    formData.append('file', recordedBlob, 'recording.wav');
    await processAudio(formData);
}

async function sendAudio() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('file', file);
    await processAudio(formData);
}

async function processAudio(formData) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    document.getElementById('error').style.display = 'none';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('sendRecordingBtn').disabled = true;

    try {
        const res = await fetch('/voicebot', { method: 'POST', body: formData });
        const data = await res.json();
        document.getElementById('transcript').textContent = data.transcript || 'N/A';
        document.getElementById('intent').textContent = data.intent || 'N/A';
        document.getElementById('confidence').textContent = ((data.confidence || 0) * 100).toFixed(0) + '%';
        document.getElementById('response').textContent = data.response || 'N/A';
        if (data.tts_status === 'success') {
            document.getElementById('audioEl').src = '/outputs/response.mp3?t=' + Date.now();
            document.getElementById('audioLabel').textContent = 'Click play to hear response';
        } else {
            document.getElementById('audioLabel').textContent = 'Audio unavailable';
        }
        document.getElementById('results').style.display = 'block';
    } catch (err) {
        document.getElementById('error').textContent = 'Error: ' + err.message;
        document.getElementById('error').style.display = 'block';
    } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('sendRecordingBtn').disabled = false;
    }
}
</script>
</body>
</html>
